name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # OIDC Trusted Publishing requires npm >= 11.5.1; pin to latest to guarantee
      # it regardless of which npm the selected Node ships.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
